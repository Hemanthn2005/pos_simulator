<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Simulator - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: 0.05em;
        }
        .logo h1 span { color: #e94560; }
        .logo p { color: #6b7280; font-size: 0.9rem; margin-top: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: #4b5563;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus { border-color: #e94560; }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }
        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.15s;
        }
        .login-btn:hover {
            background: #d63851;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.3);
        }
        .demo-credentials {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f3f4f6;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #6b7280;
            text-align: center;
        }
        .demo-credentials strong { display: block; color: #374151; margin-bottom: 0.25rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>POS <span>SIMULATOR</span></h1>
            <p>Point of Sale System</p>
        </div>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">🔐 Sign In</button>
        </form>
        
        <div class="demo-credentials">
            <strong>Demo Credentials</strong>
            Username: <code>admin</code><br>
            Password: <code>admin123</code>
        </div>
    </div>
</body>
</html>
